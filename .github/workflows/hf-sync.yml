name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Backend/**'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_SPACE_ID" ]; then
            echo "Error: HF_SPACE_ID is not set in GitHub Repository Variables."
            exit 1
          fi
          git config --global user.email "hawk-agent@huggingface.co"
          git config --global user.name "Hawk Agent"
          # Force push the split commit to overwrite remote state
          SHA=$(git subtree split --prefix=Backend)
          git push https://a-k-dey:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_ID $SHA:main --force
